[package]
name = "rosemary"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1"
thiserror = "2"

bytes = "1"

serde = { version = "1", features = ["derive"] }
serde_json = "1"

futures = "0.3"
tokio = { version = "1", features = ["full"] }
futures-util = "0.3"
tokio-util = "0.7"

reqwest = { version = "0.12", features = ["json"] }

## async queue
# async runtime 
async-task = "4.7"
# lightweight implementation of futures
futures-lite = "2.6"
# MPMC channel
flume = "0.11"
