[package]
name = "rosemary"
version = "0.5.0"
edition = "2024"
authors = ["haru <azusachino@proton.me>"]
description = "A persistent, project-local knowledge graph CLI for AI agents."
license = "MIT"
repository = "https://github.com/azusachino/rosemary"
keywords = ["knowledge-graph", "cli", "ai-agents", "persistent-memory", "rust"]
categories = ["development-tools"]

[features]
default = []
documents = [
    "dep:fastembed",
    "dep:walkdir",
]

[dependencies]
# Core
anyhow = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "time", "sync", "signal"] }
uuid = { version = "1", features = ["v4"] }


# CLI
clap = { version = "4.5", features = ["derive"] }
walkdir = { version = "2", optional = true }
directories = "6"
toml = "0.8"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Time
chrono = { version = "0.4", default-features = false, features = ["clock"] }

# Chunking & Embedding
fastembed = { version = "5", optional = true }


# Database & Vector Store
libsql = "0.6"


[dev-dependencies]
filetime = "0.2"
tempfile = "3"

[[bench]]
name = "graph"
harness = false

[[bench]]
name = "normalize"
harness = false

[profile.release]
opt-level = "s"      # Optimize for size
lto = true           # Link Time Optimization
codegen-units = 1    # Maximize LTO impact
strip = true         # Remove symbols
panic = "abort"      # Remove panic handling overhead
